{% extends "base.html" %}
{% block title %}系统日志 - Hermes{% endblock %}
{% block content %}
<div class="px-4 sm:px-0">
    <h1 class="text-3xl font-bold text-white mb-6">系统日志</h1>
    
    <div class="bg-gray-800 rounded-lg p-6 border border-gray-700">
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold">实时日志</h2>
            <button hx-get="/api/logs" hx-target="#log-content" class="bg-blue-600 hover:bg-blue-700 text-white px-3 py-1.5 rounded-md text-sm font-medium">
                刷新
            </button>
        </div>
        <div id="log-content" class="bg-gray-900 rounded-md p-4 font-mono text-xs text-gray-300 h-96 overflow-y-auto">
{{ log_content | default("暂无日志") }}
        </div>
    </div>
</div>
{% endblock %}
