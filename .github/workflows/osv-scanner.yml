name: OSV-Scanner

# Scans lockfiles (uv.lock, package-lock.json) against the OSV vulnerability
# database. Runs on every PR that touches a lockfile and on a weekly schedule
# against main.
#
# This is detection-only — OSV-Scanner does NOT open PRs or modify pins.
# It reports known CVEs in currently-pinned dependency versions so we can
# decide when and how to patch on our own schedule.
#
# Uses google/osv-scanner-action Docker action directly (instead of the
# reusable workflow) because actions/checkout@v6 inside the reusable workflow
# consistently fails on fork environments. The self-contained job below
# handles checkout with stable v4 before running the scanner.
#
# See: https://github.com/weijinsheng123456/hermes-agent/actions/runs/26401628447

on:
  pull_request:
    branches: [main]
    paths:
      - 'uv.lock'
      - 'pyproject.toml'
      - 'package.json'
      - 'package-lock.json'
      - 'ui-tui/package.json'
      - 'ui-tui/package-lock.json'
      - 'website/package.json'
      - 'website/package-lock.json'
      - '.github/workflows/osv-scanner.yml'
  push:
    branches: [main]
    paths:
      - 'uv.lock'
      - 'pyproject.toml'
      - 'package.json'
      - 'package-lock.json'
      - 'ui-tui/package-lock.json'
      - 'website/package-lock.json'
  schedule:
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  scan:
    name: Scan lockfiles
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
        continue-on-error: true
        with:
          scan-args: |-
            --output=results.json
            --format=json
            --lockfile=uv.lock
            --lockfile=ui-tui/package-lock.json
            --lockfile=website/package-lock.json

      - name: Convert to SARIF
        uses: google/osv-scanner-action/osv-reporter-action@9a498708959aeaef5ef730655706c5a1df1edbc2  # v2.3.8
        with:
          scan-args: |-
            --output=results.sarif
            --new=results.json
            --gh-annotations=false
            --fail-on-vuln=false

      - name: Upload SARIF to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
          category: osv-scanner
